---
- name: Wait for MariaDB to be healthy
  command: docker compose exec -T db healthcheck.sh --connect --innodb_initialized
  args:
    chdir: "{{ playbook_dir }}/../compose"
  register: db_health
  until: db_health.rc == 0
  retries: 15
  delay: 3
  changed_when: false

- name: Read MYSQL_ROOT_PASSWORD from .env
  shell: grep '^MYSQL_ROOT_PASSWORD=' "{{ playbook_dir }}/../compose/.env" | cut -d= -f2-
  register: mysql_root_pw
  changed_when: false

- name: Read MYSQLD_EXPORTER_PASSWORD from .env
  shell: grep '^MYSQLD_EXPORTER_PASSWORD=' "{{ playbook_dir }}/../compose/.env" | cut -d= -f2-
  register: exporter_pw
  changed_when: false

- name: Create MySQL exporter monitoring user
  shell: >
    docker compose exec -T db mariadb -u root -p"{{ mysql_root_pw.stdout }}"
    -e "CREATE USER IF NOT EXISTS 'exporter'@'%' IDENTIFIED BY '{{ exporter_pw.stdout }}'; GRANT SELECT, PROCESS, REPLICATION CLIENT, SLAVE MONITOR ON *.* TO 'exporter'@'%'; FLUSH PRIVILEGES;"
  args:
    chdir: "{{ playbook_dir }}/../compose"
  changed_when: true
  no_log: true
