---
- name: Check Docker is installed
  ansible.builtin.command: docker --version
  register: nextcloud_deploy_docker_check
  changed_when: false
  failed_when: nextcloud_deploy_docker_check.rc != 0

- name: Check Docker daemon is running
  ansible.builtin.command: docker info
  register: nextcloud_deploy_docker_info
  changed_when: false
  failed_when: nextcloud_deploy_docker_info.rc != 0

- name: Report Docker version
  ansible.builtin.debug:
    msg: "Docker is installed and running: {{ nextcloud_deploy_docker_check.stdout }}"

- name: Ensure .env file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../compose/.env"
  register: nextcloud_deploy_env_file

- name: Fail if .env is missing
  ansible.builtin.fail:
    msg: ".env file not found in compose/ — copy .env.example and fill in real values before deploying"
  when: not nextcloud_deploy_env_file.stat.exists

- name: Pull latest images
  ansible.builtin.command: docker compose pull
  args:
    chdir: "{{ playbook_dir }}/../compose"
  changed_when: false

- name: Bring up the stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ playbook_dir }}/../compose"
  register: nextcloud_deploy_compose_up
  changed_when: "'Started' in nextcloud_deploy_compose_up.stderr or 'Created' in nextcloud_deploy_compose_up.stderr"

- name: Show compose up output
  ansible.builtin.debug:
    msg: "{{ nextcloud_deploy_compose_up.stdout_lines }}"

- name: Set up MySQL exporter user
  ansible.builtin.include_tasks: exporter_user.yml

- name: Wait for Nextcloud to finish first-run install
  ansible.builtin.command: docker compose exec -T app php occ status
  args:
    chdir: "{{ playbook_dir }}/../compose"
  register: nextcloud_deploy_nc_status
  until: "'installed: true' in nextcloud_deploy_nc_status.stdout"
  retries: 20
  delay: 5
  changed_when: false

- name: Copy config override file into the app container
  ansible.builtin.command: >
    docker compose cp ./nextcloud-overrides.config.php
    app:/var/www/html/config/nextcloud-overrides.config.php
  args:
    chdir: "{{ playbook_dir }}/../compose"
  changed_when: true

- name: Copy config override file into the cron container
  ansible.builtin.command: >
    docker compose cp ./nextcloud-overrides.config.php
    cron:/var/www/html/config/nextcloud-overrides.config.php
  args:
    chdir: "{{ playbook_dir }}/../compose"
  changed_when: true

- name: Fix ownership of the copied config file (app)
  ansible.builtin.command: >
    docker compose exec -T -u root app
    chown www-data:www-data /var/www/html/config/nextcloud-overrides.config.php
  args:
    chdir: "{{ playbook_dir }}/../compose"
  changed_when: false

- name: Set background jobs mode to cron
  ansible.builtin.command: docker compose exec -T app php occ config:app:set core backgroundjobs_mode --value=cron
  args:
    chdir: "{{ playbook_dir }}/../compose"
  register: nextcloud_deploy_cron_mode_result
  changed_when: "'were not updated' not in nextcloud_deploy_cron_mode_result.stdout"

- name: Run expensive maintenance repairs (mimetype migrations, etc.)
  ansible.builtin.command: docker compose exec -T app php occ maintenance:repair --include-expensive
  args:
    chdir: "{{ playbook_dir }}/../compose"
  register: nextcloud_deploy_repair_result
  changed_when: true

- name: Download Node Exporter Full dashboard
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/1860/revisions/latest/download
    dest: "{{ playbook_dir }}/../compose/grafana-provisioning/dashboards/node-exporter-full.json"
    mode: '0644'

- name: Download MySQL/MariaDB dashboard
  ansible.builtin.get_url:
    url: https://grafana.com/api/dashboards/7362/revisions/latest/download
    dest: "{{ playbook_dir }}/../compose/grafana-provisioning/dashboards/mysql-overview.json"
    mode: '0644'

- name: Replace templated datasource variable in MySQL dashboard
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/../compose/grafana-provisioning/dashboards/mysql-overview.json"
    regexp: '\$\{DS_PROMETHEUS\}'
    replace: 'Prometheus'

- name: Replace templated datasource variable in Node Exporter dashboard
  ansible.builtin.replace:
    path: "{{ playbook_dir }}/../compose/grafana-provisioning/dashboards/node-exporter-full.json"
    regexp: '\$\{DS_PROMETHEUS\}'
    replace: 'Prometheus'
