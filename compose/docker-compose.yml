services:
  db:
    image: mariadb:11
    container_name: nc_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --innodb-file-per-table=1 --skip-innodb-read-only-compressed
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_net

  redis:
    image: redis:7-alpine
    container_name: nc_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - nextcloud_net

  app:
    image: nextcloud:fpm
    container_name: nc_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - nc_data:/var/www/html
    environment:
      MYSQL_HOST: db
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAIN}
      PHP_MEMORY_LIMIT: 1G
      PHP_UPLOAD_LIMIT: 3G
    networks:
      - nextcloud_net

  cron:
    image: nextcloud:fpm
    container_name: nc_cron
    restart: always
    entrypoint: /cron.sh
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - nc_data:/var/www/html
    environment:
      MYSQL_HOST: db
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - nextcloud_net

  web:
    image: nginx:alpine
    container_name: nc_web
    restart: always
    depends_on:
      - app
    volumes:
      - nc_data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - nextcloud_net

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: nc_caddy
    restart: always
    depends_on:
      - web
    ports:
      - "443:443"
      - "80:80"
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      nextcloud_net:
        aliases:
          - nikolajs-nextcloud.lat

  node_exporter:
    image: prom/node-exporter:latest
    container_name: nc_node_exporter
    restart: always
    networks:
      - nextcloud_net

  mysqld_exporter:
    image: prom/mysqld-exporter:latest
    container_name: nc_mysqld_exporter
    restart: always
    command:
      - --config.my-cnf=/etc/mysqld_exporter.cnf
    volumes:
      - ./mysqld_exporter.cnf:/etc/mysqld_exporter.cnf:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nextcloud_net

  prometheus:
    image: prom/prometheus:latest
    container_name: nc_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - nextcloud_net

  grafana:
    image: grafana/grafana:latest
    container_name: nc_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - nextcloud_net

  loki:
    image: grafana/loki:latest
    container_name: nc_loki
    restart: always
    volumes:
      - loki_data:/loki
    networks:
      - nextcloud_net

  alloy:
    image: grafana/alloy:latest
    container_name: nc_alloy
    restart: always
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - nextcloud_net

volumes:
  db_data:
  redis_data:
  nc_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  nextcloud_net:
    name: nextcloud_net
